version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      - CHOKIDAR_USEPOLLING=true # Useful for hot-reload in some Docker environments

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - ./client/.env # Make sure to create this file or Vite won't see the API URL
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
